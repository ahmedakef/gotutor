<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #333;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      box-sizing: border-box;
      tab-size: 4;
    }
    textarea:focus {
      outline: none;
      border-color: #00add8;
    }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #00add8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #0097b9;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .error {
      margin-top: 8px;
      color: #d32f2f;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h3>Visualize Go code in GoTutor</h3>
  <textarea id="code" placeholder="Paste your Go code here..."></textarea>
  <button id="visualize">Visualize in GoTutor</button>
  <div id="error" class="error"></div>
  <script src="popup.js"></script>
</body>
</html>
